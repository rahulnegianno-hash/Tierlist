<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tierlist Maker</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

<h1>🔥 Tierlist Maker</h1>
<p style="text-align:center;color:#aaa;margin-top:-10px;">
  Drag • Rank • Share
</p>

<div class="topbar">

  <input id="search" placeholder="Search characters...">

  <!-- ✅ ONLY ONE UPLOAD -->
  <input type="file" id="upload" multiple>

  <button onclick="addTier()">➕ Add Tier</button>

  <button onclick="downloadImage()">📸 Download</button>

  <button onclick="exportData()">💾 Export</button>

  <button onclick="getShareLink()">🔗 Share</button>

  <!-- OPTIONAL IMPORT -->
  <label style="background:#333;padding:6px;border-radius:6px;cursor:pointer;">
    📂 Import
    <input type="file" onchange="importData(event)" hidden>
  </label>

  <button onclick="resetTier()">♻️ Reset</button>

</div>

<div id="tiers"></div>

<script src="script.js"></script>

</body>
</html>
