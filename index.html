<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; }

.tier { display:flex; margin:10px; padding:10px; border-radius:10px; }
.label { width:80px; font-weight:bold; }

.dropzone {
  flex:1;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  min-height:80px;
}

.card {
  width:70px;
  text-align:center;
  cursor:grab;
}

.card img {
  width:70px;
  height:70px;
  border-radius:10px;
}

.M {background:#ff4d6d;}
.SSS {background:#ffcc00; color:black;}
.A {background:#4caf50;}
.B {background:#2196f3;}
.C {background:#ff9800;}
.D {background:#f44336;}

#pool {
  margin:20px;
  border:2px dashed white;
  padding:10px;
  min-height:100px;
}
</style>
</head>

<body>

<h2>🔥 Tier List</h2>
<button onclick="downloadImage()">Download</button>

<div id="capture">
  <div class="tier M"><div class="label">Meri Jaan</div><div class="dropzone"></div></div>
  <div class="tier SSS"><div class="label">SSS</div><div class="dropzone"></div></div>
  <div class="tier A"><div class="label">A</div><div class="dropzone"></div></div>
  <div class="tier B"><div class="label">B</div><div class="dropzone"></div></div>
  <div class="tier C"><div class="label">C</div><div class="dropzone"></div></div>
  <div class="tier D"><div class="label">D</div><div class="dropzone"></div></div>

  <h3>Characters</h3>
  <div id="pool" class="dropzone"></div>
</div>

<script>
let dragged=null;

const characters=[
  {name:"Changli", img:"Changli.webp"},
  {name:"Yinlin", img:"Yinlin.webp"}
];

const pool=document.getElementById("pool");

// load characters
characters.forEach(c=>{
  const card=document.createElement("div");
  card.className="card";
  card.draggable=true;

  const img=new Image();
  img.src=c.img;
  img.crossOrigin="anonymous";

  const name=document.createElement("div");
  name.innerText=c.name;

  card.appendChild(img);
  card.appendChild(name);

  card.addEventListener("dragstart",()=>dragged=card);

  pool.appendChild(card);
});

// drop system
document.querySelectorAll(".dropzone").forEach(z=>{
  z.addEventListener("dragover",e=>e.preventDefault());
  z.addEventListener("drop",()=>{
    if(dragged) z.appendChild(dragged);
  });
});

// download (FIXED)
function downloadImage(){
  html2canvas(document.getElementById("capture"), {
    useCORS: true,
    allowTaint: true
  }).then(canvas=>{
    let a=document.createElement("a");
    a.download="tier.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}
</script>

</body>
</html>
