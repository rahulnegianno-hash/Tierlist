<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier List Maker</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

<h1>🔥 Tier List Maker</h1>

<div class="topbar">
  <input id="search" placeholder="Search...">
  <input type="file" id="upload" multiple>
  <button onclick="downloadImage()">Download</button>
  <button onclick="resetTier()">Reset</button>
</div>

<div class="tier"><span>S</span><div class="dropzone" data-tier="S"></div></div>
<div class="tier"><span>A</span><div class="dropzone" data-tier="A"></div></div>
<div class="tier"><span>B</span><div class="dropzone" data-tier="B"></div></div>
<div class="tier"><span>C</span><div class="dropzone" data-tier="C"></div></div>
<div class="tier"><span>POOL</span><div class="dropzone" data-tier="pool"></div></div>

<script src="script.js"></script>
</body>
</html>
