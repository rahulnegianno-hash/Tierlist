<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tierlist</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h2 {
  margin:10px;
}

/* TOPBAR */
.topbar {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:10px;
}

button, input {
  padding:8px;
  border:none;
  border-radius:6px;
  font-size:14px;
}

/* TIER */
.tier {
  display:flex;
  margin:8px;
  background:#222;
  border-radius:8px;
}

/* LABEL */
.tier span {
  width:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* DROPZONE */
.dropzone {
  flex:1;
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  gap:6px;
  padding:8px;
}

/* CARD */
.card {
  width:70px;
  cursor:grab;
}

.card img {
  width:100%;
  border-radius:6px;
}

/* MOBILE */
@media(max-width:600px){
  .card { width:55px; }
  .tier span { width:45px; font-size:12px; }
}
</style>
</head>

<body>

<h2>🔥 Tierlist</h2>

<div class="topbar">
  <input type="file" id="upload" multiple>
  <button onclick="downloadImage()">Download</button>
  <button onclick="resetData()">Reset</button>
</div>

<div id="tiers"></div>

<script>
const STORAGE_KEY = "tier_save_v1";

let chars = [];
let dragged = null;

const tiers = ["S","A","B","C","pool"];

/* LOAD */
function load(){
  const data = localStorage.getItem(STORAGE_KEY);
  if(data){
    chars = JSON.parse(data);
  }
}

/* SAVE */
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(chars));
}

/* RENDER */
function render(){
  const container = document.getElementById("tiers");
  container.innerHTML = "";

  tiers.forEach(tier=>{
    const div = document.createElement("div");
    div.className = "tier";

    div.innerHTML = `
      <span>${tier}</span>
      <div class="dropzone" data-tier="${tier}"></div>
    `;

    container.appendChild(div);
  });

  chars.forEach(c=>{
    const zone = document.querySelector(`[data-tier="${c.tier}"]`);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img src="${c.img}">`;

    card.draggable = true;

    card.addEventListener("dragstart", ()=>{
      dragged = c;
    });

    card.addEventListener("dragend", ()=>{
      save();
    });

    zone.appendChild(card);
  });

  document.querySelectorAll(".dropzone").forEach(zone=>{
    zone.addEventListener("dragover", e=>{
      e.preventDefault();
    });

    zone.addEventListener("drop", ()=>{
      if(!dragged) return;

      dragged.tier = zone.dataset.tier;
      dragged = null;

      save();
      render();
    });
  });
}

/* UPLOAD */
document.getElementById("upload").addEventListener("change", e=>{
  Array.from(e.target.files).forEach(file=>{
    const reader = new FileReader();

    reader.onload = ev=>{
      chars.push({
        img: ev.target.result,
        tier: "pool"
      });
      save();
      render();
    };

    reader.readAsDataURL(file);
  });
});

/* DOWNLOAD */
function downloadImage(){
  html2canvas(document.body,{scale:2}).then(canvas=>{
    const a = document.createElement("a");
    a.href = canvas.toDataURL();
    a.download = "tierlist.png";
    a.click();
  });
}

/* RESET */
function resetData(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* INIT */
load();
render();
</script>

</body>
</html>
