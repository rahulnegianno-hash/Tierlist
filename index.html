// LOAD DATA
const saved = localStorage.getItem("tierData");
if(saved){
  characters = JSON.parse(saved);
}

// RENDER
function render(){
  document.querySelectorAll(".dropzone").forEach(z => z.innerHTML = "");

  characters.forEach(c=>{
    const card = document.createElement("div");
    card.className = "card";
    card.draggable = true;

    card.innerHTML = `
      <img src="${c.img}">
      <div>${c.name}</div>
    `;

    card.addEventListener("dragstart",()=>dragged=card);

    const zone = document.querySelector(`[data-tier="${c.tier}"]`);
    zone.appendChild(card);
  });
}

// DROP SYSTEM
document.querySelectorAll(".dropzone").forEach(z=>{
  z.addEventListener("dragover",e=>e.preventDefault());

  z.addEventListener("drop",()=>{
    if(dragged){
      z.appendChild(dragged);

      const name = dragged.innerText.trim();
      const tier = z.dataset.tier;

      characters.forEach(c=>{
        if(c.name === name){
          c.tier = tier;
        }
      });

      localStorage.setItem("tierData", JSON.stringify(characters));
    }
  });
});

// DOWNLOAD PNG
function downloadImage(){
  html2canvas(document.body).then(canvas=>{
    let a=document.createElement("a");
    a.download="tier.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

render();
