<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

h2 { margin-top:10px; }

.controls {
  margin:15px;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.tier {
  display:flex;
  margin:10px;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.label {
  width:120px;
  font-weight:bold;
}

.dropzone {
  flex:1;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  min-height:80px;
}

.card {
  width:75px;
  text-align:center;
  cursor:grab;
  transition:0.2s;
}

.card:hover {
  transform: scale(1.1);
}

.card img {
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

.M {background:#ff4d6d;}
.SSS {background:#ffcc00; color:black;}
.A {background:#4caf50;}
.B {background:#2196f3;}
.C {background:#ff9800;}
.D {background:#f44336;}

#pool {
  margin:20px;
  border:2px dashed white;
  padding:10px;
  min-height:100px;
}
</style>
</head>

<body>

<h2>🔥 Tier List Maker</h2>

<div class="controls">
  <button onclick="downloadImage()">Download PNG</button>
  <button onclick="resetTier()">Reset</button>
  <input type="file" id="upload" accept="image/*">
</div>

<div class="tier M"><div class="label">Meri Jaan</div><div class="dropzone" data-tier="M"></div></div>
<div class="tier SSS"><div class="label">SSS</div><div class="dropzone" data-tier="SSS"></div></div>
<div class="tier A"><div class="label">A</div><div class="dropzone" data-tier="A"></div></div>
<div class="tier B"><div class="label">B</div><div class="dropzone" data-tier="B"></div></div>
<div class="tier C"><div class="label">C</div><div class="dropzone" data-tier="C"></div></div>
<div class="tier D"><div class="label">D</div><div class="dropzone" data-tier="D"></div></div>

<h3>Characters</h3>
<div id="pool" class="dropzone" data-tier="pool"></div>

<script>

let dragged = null;

// 🔥 CHARACTER DATA
let characters = [

{id:1,name:"Jinshi",img:"images/Jinshi.png",tier:"pool"},
{id:2,name:"Changli",img:"images/Changli.png",tier:"pool"},
{id:3,name:"Yinlin",img:"images/Yinlin.png",tier:"pool"},

{id:4,name:"Aemeath",img:"images/Aemeath.png",tier:"pool"},
{id:5,name:"Augusta",img:"images/Augusta.png",tier:"pool"},
{id:6,name:"Phrolova",img:"images/Phrolova.png",tier:"pool"},
{id:7,name:"Shorekeeper",img:"images/Shorekeeper.png",tier:"pool"},
{id:8,name:"Camellya",img:"images/Camellya.png",tier:"pool"},
{id:9,name:"Cantarella",img:"images/Cantarella.png",tier:"pool"},
{id:10,name:"Carlotta",img:"images/Carlotta.png",tier:"pool"},
{id:11,name:"Chisa",img:"images/Chisa.png",tier:"pool"},
{id:12,name:"Encore",img:"images/Encore.png",tier:"pool"},
{id:13,name:"Iuno",img:"images/Iuno.png",tier:"pool"},
{id:14,name:"Lynae",img:"images/Lynae.png",tier:"pool"},
{id:15,name:"Phoebe",img:"images/Phoebe.png",tier:"pool"}

];


// LOAD SAVE
const saved = localStorage.getItem("tierData");
if(saved){
  characters = JSON.parse(saved);
}

// RENDER
function render(){
  document.querySelectorAll(".dropzone").forEach(z => z.innerHTML = "");

  characters.forEach(c=>{
    const card = document.createElement("div");
    card.className = "card";
    card.draggable = true;

    card.innerHTML = `
      <img src="${c.img}">
      <div>${c.name}</div>
    `;

    card.addEventListener("dragstart",()=>dragged=card);

    const zone = document.querySelector(`[data-tier="${c.tier}"]`);
    zone.appendChild(card);
  });
}

// DROP SYSTEM
document.querySelectorAll(".dropzone").forEach(z=>{
  z.addEventListener("dragover",e=>e.preventDefault());

  z.addEventListener("drop",()=>{
    if(dragged){
      z.appendChild(dragged);

      const name = dragged.querySelector("div").innerText;
      const tier = z.dataset.tier;

      characters.forEach(c=>{
        if(c.name === name){
          c.tier = tier;
        }
      });

      sortTier(tier);
      localStorage.setItem("tierData", JSON.stringify(characters));
    }
  });
});

// SORT
function sortTier(tier){
  const zone = document.querySelector(`[data-tier="${tier}"]`);
  const cards = Array.from(zone.children);

  cards.sort((a,b)=>{
    return a.innerText.localeCompare(b.innerText);
  });

  cards.forEach(c=>zone.appendChild(c));
}

// RESET
function resetTier(){
  localStorage.removeItem("tierData");
  location.reload();
}

// IMAGE UPLOAD
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(event){
    const newChar = {
      name: "Custom " + Date.now(),
      img: event.target.result,
      tier: "pool"
    };

    characters.push(newChar);
    localStorage.setItem("tierData", JSON.stringify(characters));
    render();
  };
  reader.readAsDataURL(file);
});

// DOWNLOAD PNG
function downloadImage(){
  html2canvas(document.body).then(canvas=>{
    let a=document.createElement("a");
    a.download="tier.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

render();

</script>

</body>
</html>
